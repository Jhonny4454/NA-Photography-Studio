<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Get Hired - NA Photography Studio</title>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #ff7f50, #ff9966);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
  box-sizing: border-box;
  position: relative;
}

body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: rgba(255,255,255,0.15);
  filter: blur(120px);
  top: -100px;
  left: -100px;
  border-radius: 50%;
  z-index: -2;
}

body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(0,0,0,0.15);
  filter: blur(120px);
  bottom: -100px;
  right: -100px;
  border-radius: 50%;
  z-index: -2;
}

.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 25px 60px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.3);
  box-sizing: border-box;
  position: relative;
  z-index: 1;
  animation: slideUp 0.7s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(50px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: white;
  font-size: 24px;
}

p {
  text-align: center;
  margin-bottom: 30px;
  color: white;
  font-size: 16px;
}

.back-buttons {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.back-buttons a {
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  color: white;
  font-weight: bold;
  transition: all 0.3s ease;
}

.back-buttons a:hover {
  background: rgba(255,255,255,0.35);
  transform: scale(1.05);
}

form {
  display: flex;
  flex-direction: column;
}

.form-group {
  position: relative;
  margin-bottom: 18px;
}

.form-group i {
  position: absolute;
  top: 50%;
  left: 14px;
  transform: translateY(-50%);
  color: #eee;
  font-size: 16px;
}

input, textarea {
  width: 100%;
  padding: 12px 12px 12px 40px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
  background: rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(10px);
  box-sizing: border-box;
  resize: vertical;
}

input::placeholder, textarea::placeholder {
  color: #ddd;
}

input:focus, textarea:focus {
  box-shadow: 0 0 12px rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.3);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff7f50, #ff6347);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 15px 35px rgba(255,127,80,0.6);
}
</style>
</head>
<body>

<div class="container">

  <div class="back-buttons">
    <a href="/home"><i class="fas fa-home"></i> Home</a>
    <a href="/"><i class="fas fa-sign-in-alt"></i> Login</a>
  </div>

  <h1>Become a Photographer with Us</h1>
  <p>Fill out our application form and join our talented team of photographers.</p>

  <form method="POST" action="/photographer/apply">
    <div class="form-group">
      <i class="fas fa-user"></i>
      <input type="text" name="first_name" placeholder="First Name" required>
    </div>
    <div class="form-group">
      <i class="fas fa-user"></i>
      <input type="text" name="last_name" placeholder="Last Name" required>
    </div>
    <div class="form-group">
      <i class="fas fa-envelope"></i>
      <input type="email" name="email" placeholder="Email Address" required>
    </div>
    <div class="form-group">
      <i class="fas fa-phone"></i>
      <input type="tel" name="phone" placeholder="Phone Number" required>
    </div>
    <div class="form-group">
      <i class="fas fa-home"></i>
      <input type="text" name="address" placeholder="Address" required>
    </div>
    <div class="form-group">
      <i class="fas fa-calendar-alt"></i>
      <input type="number" name="years" placeholder="Years of Experience" min="0" required>
    </div>
    <div class="form-group">
      <i class="fas fa-calendar-alt"></i>
      <input type="number" name="months" placeholder="Months of Experience" min="0" max="11" required>
    </div>

    <button type="submit"><i class="fas fa-paper-plane"></i> Submit Application</button>
  </form>
</div>

</body>
</html>
