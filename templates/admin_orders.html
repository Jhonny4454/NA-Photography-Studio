<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
}

/* NAVBAR */
.navbar {
  background: #2c3e50;
  padding: 15px 20px;
}

.navbar a {
  color: white;
  margin-right: 15px;
  text-decoration: none;
}

.navbar a:hover {
  color: #ff7f50;
}

.logout {
  float: right;
  color: #e74c3c;
}

/* HEADER */
header {
  background: white;
  padding: 15px 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.logo {
  font-weight: bold;
  color: #ff7f50;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: 40px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

/* SEARCH */
.search-box input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  text-align: center;
}

th {
  background: #ff7f50;
  color: white;
}

tr:nth-child(even) {
  background: #f9f9f9;
}

tr:hover {
  background: #f1f1f1;
}

/* STATUS BADGES */
.status {
  padding: 5px 10px;
  border-radius: 12px;
  color: white;
  font-size: 12px;
}

.pending {
  background: #f39c12;
}

.completed {
  background: #27ae60;
}

.cancelled {
  background: #e74c3c;
}

/* BUTTON */
.btn {
  padding: 6px 12px;
  background: #ff7f50;
  color: white;
  border-radius: 20px;
  text-decoration: none;
  font-size: 14px;
}

.btn:hover {
  background: #ff6347;
}

/* EMPTY */
.no-data {
  text-align: center;
  padding: 20px;
  color: gray;
}
</style>

<script>
function searchOrders() {
  let input = document.getElementById("search").value.toLowerCase();
  let rows = document.querySelectorAll("tbody tr");

  rows.forEach(row => {
    let text = row.innerText.toLowerCase();
    row.style.display = text.includes(input) ? "" : "none";
  });
}
</script>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="/admin/dashboard"><i class="fas fa-home"></i> Dashboard</a>
  <a href="/admin/packages"><i class="fas fa-camera"></i> Packages</a>
  <a href="/admin/orders"><i class="fas fa-box"></i> Orders</a>
  <a href="/admin/users"><i class="fas fa-users"></i> Users</a>
  <a href="/logout" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- HEADER -->
<header>
  <div class="logo">Admin Panel - Orders</div>
</header>

<!-- MAIN -->
<div class="container">

  <div class="top-bar">
    <h2><i class="fas fa-box"></i> All Orders</h2>
    <div class="search-box">
      <input type="text" id="search" placeholder="Search orders..." onkeyup="searchOrders()">
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Order ID</th>
        <th>User</th>
        <th>Total</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      {% if orders %}
        {% for o in orders %}
        <tr>
          <td>{{ o.order_id }}</td>
          <td>{{ o.first_name }} {{ o.last_name }}</td>
          <td>₹{{ o.total_price }}</td>
          <td>
            <span class="status 
              {% if o.status == 'Pending' %}pending
              {% elif o.status == 'Completed' %}completed
              {% else %}cancelled{% endif %}">
              {{ o.status }}
            </span>
          </td>
          <td>
            <a href="/admin/order_details/{{ o.order_id }}" class="btn">View</a>
          </td>
        </tr>
        {% endfor %}
      {% else %}
        <tr>
          <td colspan="5" class="no-data">No orders found</td>
        </tr>
      {% endif %}
    </tbody>
  </table>

</div>

</body>
</html>
