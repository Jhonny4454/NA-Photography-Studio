<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Photographer - Admin | NA Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
  color: white;
  height: 100vh;
  padding: 25px 20px;
  position: sticky;
  top: 0;
  box-shadow: 2px 0 10px rgba(0,0,0,0.1);
}

.sidebar h2 {
  color: #ff7f50;
  margin-bottom: 30px;
  font-size: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar h2 i {
  font-size: 28px;
}

.sidebar a {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #ccc;
  text-decoration: none;
  margin: 8px 0;
  padding: 12px 15px;
  border-radius: 12px;
  transition: all 0.3s ease;
}

.sidebar a i {
  width: 22px;
  font-size: 18px;
}

.sidebar a:hover {
  background: #ff7f50;
  color: white;
  transform: translateX(5px);
}

/* MAIN */
.main {
  flex: 1;
  padding: 25px 30px;
  overflow-y: auto;
  height: 100vh;
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  padding-bottom: 15px;
  border-bottom: 2px solid #ff7f50;
}

.top-bar h1 {
  font-size: 28px;
  color: #333;
  display: flex;
  align-items: center;
  gap: 10px;
}

.top-bar h1 i {
  color: #ff7f50;
}

/* FORM CARD */
.form-card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  max-width: 600px;
  margin: 0 auto;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  color: #555;
  margin-bottom: 8px;
}

.form-group label i {
  color: #ff7f50;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
  transition: all 0.3s ease;
}

.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: #ff7f50;
  box-shadow: 0 0 8px rgba(255,127,80,0.3);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

/* BUTTONS */
.button-group {
  display: flex;
  gap: 15px;
  margin-top: 25px;
}

.btn-save {
  background: linear-gradient(135deg, #2ecc71, #27ae60);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
}

.btn-save:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(46,204,113,0.4);
}

.btn-cancel {
  background: linear-gradient(135deg, #95a5a6, #7f8c8d);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  transition: all 0.3s ease;
}

.btn-cancel:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(149,165,166,0.4);
}

/* FLASH MESSAGES */
.flash {
  padding: 15px 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideDown 0.5s ease;
}

@keyframes slideDown {
  from {
    transform: translateY(-20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.flash-success {
  background: #d4edda;
  color: #155724;
  border-left: 4px solid #28a745;
}

.flash-error {
  background: #f8d7da;
  color: #721c24;
  border-left: 4px solid #dc3545;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  body {
    flex-direction: column;
  }
  
  .sidebar {
    width: 100%;
    height: auto;
    position: relative;
    padding: 15px;
  }
  
  .sidebar a {
    display: inline-flex;
    margin: 5px;
  }
  
  .main {
    padding: 20px;
  }
  
  .form-row {
    grid-template-columns: 1fr;
  }
  
  .button-group {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>
    <i class="fas fa-camera"></i>
    Admin Panel
  </h2>
  <a href="/admin/dashboard">
    <i class="fas fa-tachometer-alt"></i> Dashboard
  </a>
  <a href="/admin/orders">
    <i class="fas fa-shopping-cart"></i> Orders
  </a>
  <a href="/admin/packages">
    <i class="fas fa-camera"></i> Packages
  </a>
  <a href="/admin/users">
    <i class="fas fa-users"></i> Users
  </a>
  <a href="/admin/photographers">
    <i class="fas fa-camera-retro"></i> Photographers
  </a>
  <a href="/logout">
    <i class="fas fa-sign-out-alt"></i> Logout
  </a>
</div>

<!-- MAIN -->
<div class="main">

<div class="top-bar">
  <h1>
    <i class="fas fa-edit"></i>
    Edit Photographer
  </h1>
  <a href="/admin/photographers" class="btn-cancel" style="padding: 8px 16px;">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<!-- FLASH MESSAGES -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category if category else 'success' }}">
        <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<!-- EDIT FORM -->
<div class="form-card">
  <form method="POST" action="/admin/edit_photographer/{{ photographer.id }}">
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-user"></i> First Name</label>
        <input type="text" name="first_name" value="{{ photographer.first_name }}" required>
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-user"></i> Last Name</label>
        <input type="text" name="last_name" value="{{ photographer.last_name }}" required>
      </div>
    </div>
    
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email</label>
      <input type="email" name="email" value="{{ photographer.email }}" required>
    </div>
    
    <div class="form-group">
      <label><i class="fas fa-phone"></i> Phone</label>
      <input type="tel" name="phone" value="{{ photographer.phone }}">
    </div>
    
    <div class="form-group">
      <label><i class="fas fa-briefcase"></i> Experience</label>
      <input type="text" name="experience" value="{{ photographer.experience }}" placeholder="e.g., 5 years in wedding photography">
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-star"></i> Rating (0-5)</label>
        <input type="number" name="rating" step="0.1" min="0" max="5" value="{{ photographer.rating }}">
      </div>
      
      <div class="form-group">
        <label><i class="fas fa-toggle-on"></i> Status</label>
        <select name="status">
          <option value="active" {% if photographer.status == 'active' %}selected{% endif %}>Active</option>
          <option value="inactive" {% if photographer.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>
      </div>
    </div>
    
    <div class="button-group">
      <button type="submit" class="btn-save">
        <i class="fas fa-save"></i> Save Changes
      </button>
      <a href="/admin/photographers" class="btn-cancel">
        <i class="fas fa-times"></i> Cancel
      </a>
    </div>
  </form>
</div>

</div>

</body>
</html>
