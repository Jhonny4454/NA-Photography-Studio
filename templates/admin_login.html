<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Login - NA Photography Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #1f2937, #4b5563);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  color: white;
}

/* HEADER */
header {
  background: rgba(0,0,0,0.3);
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: #ff7f50;
}

/* CENTER */
.center {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LOGIN CARD */
.container {
  width: 100%;
  max-width: 380px;
  background: white;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  text-align: center;
  color: black;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* TITLE */
h2 {
  margin-bottom: 20px;
}

/* INPUT GROUP */
.input-group {
  position: relative;
  width: 100%;
}

.input-group i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #888;
}

.input-group .toggle-password {
  right: 12px;
  left: auto;
  cursor: pointer;
}

/* ✅ FIX HERE */
input {
  width: 100%;
  padding: 12px 38px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
  box-sizing: border-box; /* FIXES OVERFLOW */
}

input:focus {
  border-color: #ff7f50;
  box-shadow: 0 0 8px rgba(255,127,80,0.4);
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 15px;
  background: linear-gradient(135deg, #ff7f50, #ff6347);
  padding: 12px;
  color: white;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(255,127,80,0.4);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* ERROR */
.error {
  color: #e74c3c;
  margin-bottom: 10px;
  font-size: 14px;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 10px;
  color: #ccc;
  font-size: 13px;
}
</style>
</head>

<body>

<header>
  <div class="logo">NA Studio Admin Page</div>
</header>

<div class="center">
  <div class="container">
    <h2><i class="fas fa-lock"></i> Admin Login</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Username" required>
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
      </div>

      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
  </div>
</div>

<div class="footer">
  © 2026 NA Photography Studio
</div>

<script>
function togglePassword() {
  const pwd = document.getElementById("password");
  pwd.type = pwd.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
