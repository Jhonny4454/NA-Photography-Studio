<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Login - NA Photography Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #f4f6f9, #e0eafc);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* HEADER */
header {
  background: #2c3e50;
  color: white;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

/* CENTER */
.center {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LOGIN CARD */
.container {
  width: 100%;
  max-width: 380px;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
  text-align: center;
}

/* TITLE */
h2 {
  margin-bottom: 20px;
}

/* INPUT GROUP */
.input-group {
  position: relative;
}

.input-group i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #888;
}

input {
  width: 100%;
  padding: 12px 12px 12px 38px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

input:focus {
  border-color: #ff7f50;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 10px;
  background: linear-gradient(135deg, #ff7f50, #ff6347);
  padding: 12px;
  color: white;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(255,127,80,0.4);
}

button:hover {
  transform: scale(1.05);
}

/* ERROR */
.error {
  color: #e74c3c;
  margin-bottom: 10px;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 10px;
  color: #777;
  font-size: 13px;
}
</style>
</head>

<body>

<header>
  <div class="logo">NA Studio</div>
</header>

<div class="center">
  <div class="container">
    <h2><i class="fas fa-lock"></i> Admin Login</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Username" required>
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
  </div>
</div>

<div class="footer">
  © 2026 NA Photography Studio
</div>

</body>
</html>
