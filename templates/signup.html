<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sign Up - SnapHire</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  margin: 0;
  font-family: 'Segoe UI', 'Arial', sans-serif;
  min-height: 100vh;
  height: auto;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
}

/* Professional background image with overlay */
body {
  background: url('https://images.unsplash.com/photo-1542038784456-1ea8e935640e?ixlib=rb-4.0.3&w=1920&h=1080&fit=crop') center/cover no-repeat fixed;
  position: relative;
}

body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.3) 100%);
  pointer-events: none;
}

/* Floating particles – subtle */
.particle {
  position: absolute;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  pointer-events: none;
  animation: float 12s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  50% { transform: translateY(-30px) translateX(20px); opacity: 0.4; }
  100% { transform: translateY(0) translateX(0); opacity: 0; }
}

/* SIGNUP CONTAINER – Enhanced glassmorphism (slightly wider) */
.signup-container {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  padding: clamp(30px, 7vw, 45px);
  border-radius: 28px;
  width: 100%;
  max-width: 520px;
  box-shadow: 0 25px 45px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.2);
  position: relative;
  z-index: 10;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  border: 1px solid rgba(255,255,255,0.3);
}

.signup-container:hover {
  transform: translateY(-5px);
  box-shadow: 0 35px 55px rgba(0,0,0,0.3);
}

/* Logo Section */
.logo-section {
  text-align: center;
  margin-bottom: 25px;
}

.logo-icon {
  width: 75px;
  height: 75px;
  background: linear-gradient(135deg, #ff7f50, #ff6347);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 18px;
  transition: transform 0.3s ease;
  box-shadow: 0 10px 20px rgba(255,127,80,0.3);
}

.logo-icon:hover {
  transform: scale(1.05);
}

.logo-icon i {
  font-size: 34px;
  color: white;
}

h2 {
  text-align: center;
  margin-bottom: 8px;
  color: #2c3e50;
  font-size: clamp(26px, 6vw, 32px);
  font-weight: 700;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.subtitle {
  text-align: center;
  color: #5d6d7e;
  font-size: 14px;
  margin-bottom: 28px;
  font-weight: 400;
}

/* Input Groups */
.input-group {
  position: relative;
  margin-bottom: 18px;
}

.input-group i {
  position: absolute;
  top: 50%;
  left: 16px;
  transform: translateY(-50%);
  color: #a0a0a0;
  z-index: 1;
  transition: color 0.3s ease;
  font-size: 16px;
}

.input-group input, .input-group select {
  width: 100%;
  padding: 13px 14px 13px 46px;
  border-radius: 16px;
  border: 1.5px solid #e2e8f0;
  outline: none;
  transition: all 0.3s ease;
  font-size: 15px;
  background: white;
  font-weight: 500;
  color: #1e293b;
}

.input-group select {
  appearance: none;
  padding: 13px 14px 13px 46px;
  cursor: pointer;
}

.input-group input:focus, .input-group select:focus {
  border-color: #ff7f50;
  box-shadow: 0 0 0 4px rgba(255,127,80,0.15);
}

.input-group input:focus + i, .input-group select:focus + i {
  color: #ff7f50;
}

/* Row for two columns (first/last name) */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-bottom: 0;
}

/* Password Toggle */
.toggle-password {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  cursor: pointer;
  color: #a0a0a0;
  transition: color 0.3s ease;
  z-index: 2;
  font-size: 16px;
}

.toggle-password:hover {
  color: #ff7f50;
}

/* Button */
.signup-btn {
  width: 100%;
  padding: 14px;
  margin-top: 25px;
  border: none;
  border-radius: 40px;
  background: linear-gradient(135deg, #ff7f50, #ff6347);
  color: white;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 20px rgba(255,127,80,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  letter-spacing: 0.5px;
}

.signup-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(255,127,80,0.45);
}

.signup-btn:active {
  transform: scale(0.98);
}

/* Login Link */
.login-link {
  text-align: center;
  margin-top: 25px;
  padding-top: 22px;
  border-top: 1px solid rgba(0,0,0,0.08);
}

.login-link a {
  text-decoration: none;
  color: #ff7f50;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
  font-size: 14px;
}

.login-link a:hover {
  color: #ff6347;
  gap: 12px;
}

/* Error Message */
.error {
  margin-top: 15px;
  text-align: center;
  color: #e74c3c;
  font-size: 13px;
  background: rgba(231,76,60,0.1);
  padding: 12px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  backdrop-filter: blur(4px);
}

/* Responsive */
@media (max-width: 550px) {
  html, body {
    padding: 15px;
  }
  
  .signup-container {
    padding: 25px;
  }
  
  .logo-icon {
    width: 60px;
    height: 60px;
  }
  
  .logo-icon i {
    font-size: 28px;
  }
  
  .row {
    grid-template-columns: 1fr;
    gap: 0;
  }
  
  .input-group input, .input-group select {
    padding: 12px 12px 12px 42px;
  }
  
  .input-group i {
    left: 14px;
    font-size: 14px;
  }
  
  .signup-btn {
    padding: 12px;
    font-size: 15px;
  }
}

@media (max-width: 768px) and (orientation: landscape) {
  html, body {
    padding: 20px;
  }
  
  .signup-container {
    padding: 20px;
  }
  
  .logo-section {
    margin-bottom: 15px;
  }
  
  .logo-icon {
    width: 55px;
    height: 55px;
  }
  
  .subtitle {
    margin-bottom: 20px;
  }
}

/* Print styles */
@media print {
  body {
    background: white;
  }
  body::before {
    display: none;
  }
  .particle {
    display: none;
  }
  .signup-container {
    background: white;
    box-shadow: none;
    border: 1px solid #ddd;
  }
  .signup-btn {
    display: none;
  }
}
</style>
</head>

<body>

<div class="signup-container">
  <div class="logo-section">
    <div class="logo-icon">
      <i class="fas fa-camera"></i>
    </div>
    <h2>
      <i class="fas fa-camera"></i>
      SnapHire
    </h2>
    <p class="subtitle">Create your account to get started</p>
  </div>

  <!-- Flash messages / errors -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="error">
          <i class="fas fa-exclamation-circle"></i>
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="/signup" id="signupForm">
    <div class="row">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="first_name" placeholder="First Name" required>
      </div>
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="last_name" placeholder="Last Name" required>
      </div>
    </div>

    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" name="email" placeholder="Email Address" required>
    </div>

    <div class="input-group">
      <i class="fas fa-phone"></i>
      <input type="tel" name="mobile" placeholder="Mobile Number (10 digits)" pattern="[0-9]{10}" title="10-digit mobile number" required>
    </div>

    <div class="input-group">
      <i class="fas fa-venus-mars"></i>
      <select name="gender" required>
        <option value="" disabled selected>Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
      <i class="fas fa-chevron-down" style="left: auto; right: 16px; pointer-events: none;"></i>
    </div>

    <div class="input-group">
      <i class="fas fa-user-circle"></i>
      <input type="text" name="username" placeholder="Username" required>
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
      <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm_password')"></i>
    </div>

    <button type="submit" class="signup-btn">
      <i class="fas fa-user-plus"></i> Sign Up
    </button>
  </form>

  <div class="login-link">
    <a href="/">
      <i class="fas fa-sign-in-alt"></i> Already have an account? Login
    </a>
  </div>
</div>

<script>
// Toggle password visibility
function togglePassword(fieldId) {
  const field = document.getElementById(fieldId);
  const icon = event.currentTarget;
  if (field.type === "password") {
    field.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    field.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

// Simple client-side password match check (optional)
document.getElementById("signupForm").addEventListener("submit", function(e) {
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm_password").value;
  if (password !== confirm) {
    e.preventDefault();
    alert("Passwords do not match!");
  }
});

// Create subtle floating particles
function createParticles() {
  for (let i = 0; i < 25; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    const size = Math.random() * 6 + 2;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 10 + 's';
    particle.style.animationDuration = Math.random() * 15 + 8 + 's';
    document.body.appendChild(particle);
  }
}

createParticles();
</script>

</body>
</html>
