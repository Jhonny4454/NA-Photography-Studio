<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Login - SnapHire</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  margin: 0;
  font-family: 'Segoe UI', 'Arial', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  height: auto;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
}

/* Simple static background - NO ANIMATION */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 60%);
  pointer-events: none;
}

/* Simple floating particles - reduced for better performance */
.particle {
  position: absolute;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  pointer-events: none;
}

/* LOGIN CONTAINER */
.login-container {
  background: rgba(255,255,255,0.98);
  backdrop-filter: blur(10px);
  padding: clamp(25px, 7vw, 40px);
  border-radius: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  position: relative;
  z-index: 10;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.login-container:hover {
  transform: translateY(-3px);
  box-shadow: 0 25px 50px rgba(0,0,0,0.25);
}

/* Logo Section */
.logo-section {
  text-align: center;
  margin-bottom: 25px;
}

.logo-icon {
  width: 65px;
  height: 65px;
  background: linear-gradient(135deg, #ff7f50, #ff6347);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
  transition: transform 0.3s ease;
}

.logo-icon:hover {
  transform: scale(1.05);
}

.logo-icon i {
  font-size: 30px;
  color: white;
}

h2 {
  text-align: center;
  margin-bottom: 8px;
  color: #333;
  font-size: clamp(24px, 6vw, 28px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.subtitle {
  text-align: center;
  color: #888;
  font-size: 13px;
  margin-bottom: 25px;
}

/* Input Groups */
.input-group {
  position: relative;
  margin-bottom: 18px;
}

.input-group i {
  position: absolute;
  top: 50%;
  left: 14px;
  transform: translateY(-50%);
  color: #999;
  z-index: 1;
  transition: color 0.3s ease;
  font-size: 14px;
}

.input-group input {
  width: 100%;
  padding: 12px 12px 12px 42px;
  border-radius: 12px;
  border: 1.5px solid #e0e0e0;
  outline: none;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  font-size: 14px;
  background: white;
}

.input-group input:focus {
  border-color: #ff7f50;
  box-shadow: 0 0 0 3px rgba(255,127,80,0.1);
}

.input-group input:focus + i {
  color: #ff7f50;
}

/* Password Toggle */
.toggle-password {
  position: absolute;
  top: 50%;
  right: 14px;
  transform: translateY(-50%);
  cursor: pointer;
  color: #999;
  transition: color 0.3s ease;
  z-index: 2;
  font-size: 14px;
}

.toggle-password:hover {
  color: #ff7f50;
}

/* Button */
.login-btn {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, #ff7f50, #ff6347);
  color: white;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 20px rgba(255,127,80,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 25px rgba(255,127,80,0.4);
}

.login-btn:active {
  transform: scale(0.98);
}

/* Sign Up Link */
.signup-link {
  text-align: center;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid #e0e0e0;
}

.signup-link a {
  text-decoration: none;
  color: #ff7f50;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.3s ease;
  font-size: 13px;
}

.signup-link a:hover {
  color: #ff6347;
}

/* Forgot Password */
.forgot-link {
  text-align: right;
  margin-bottom: 5px;
}

.forgot-link a {
  text-decoration: none;
  color: #999;
  font-size: 11px;
  transition: color 0.3s ease;
}

.forgot-link a:hover {
  color: #ff7f50;
}

/* Error Message */
.error {
  margin-top: 15px;
  text-align: center;
  color: #e74c3c;
  font-size: 12px;
  background: rgba(231,76,60,0.1);
  padding: 10px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

/* Responsive */
@media (max-width: 480px) {
  html, body {
    padding: 15px;
  }
  
  .login-container {
    padding: 20px;
  }
  
  .logo-icon {
    width: 55px;
    height: 55px;
  }
  
  .logo-icon i {
    font-size: 26px;
  }
  
  .input-group input {
    padding: 10px 10px 10px 38px;
  }
  
  .input-group i {
    left: 12px;
    font-size: 13px;
  }
  
  .login-btn {
    padding: 10px;
    font-size: 14px;
  }
}

@media (max-width: 768px) and (orientation: landscape) {
  html, body {
    padding: 20px;
  }
  
  .login-container {
    padding: 20px;
  }
  
  .logo-section {
    margin-bottom: 15px;
  }
  
  .logo-icon {
    width: 50px;
    height: 50px;
  }
  
  .subtitle {
    margin-bottom: 20px;
  }
}

/* Print styles */
@media print {
  body::before, .particle {
    display: none;
  }
  
  .login-container {
    background: white;
    box-shadow: none;
    border: 1px solid #ddd;
  }
  
  .login-btn {
    display: none;
  }
}
</style>
</head>

<body>

<div class="login-container">
  <div class="logo-section">
    <div class="logo-icon">
      <i class="fas fa-camera"></i>
    </div>
    <h2>
      <i class="fas fa-camera"></i>
      SnapHire
    </h2>
    <p class="subtitle">Welcome back! Please login to your account</p>
  </div>

  {% if error %}
    <div class="error">
      <i class="fas fa-exclamation-circle"></i>
      {{ error }}
    </div>
  {% endif %}

  <form method="POST" action="/" id="loginForm">
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" name="username" placeholder="Username" required autofocus>
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
    </div>

    <div class="forgot-link">
      <a href="#">Forgot Password?</a>
    </div>

    <button type="submit" class="login-btn">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
  </form>

  <div class="signup-link">
    <a href="/signup">
      <i class="fas fa-user-plus"></i> Don't have an account? Sign Up
    </a>
  </div>
</div>

<script>
// Toggle password visibility
function togglePassword() {
  const password = document.getElementById("password");
  const icon = document.querySelector(".toggle-password");
  
  if (password.type === "password") {
    password.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    password.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

// Create simple static particles (no animation for better performance)
function createParticles() {
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    const size = Math.random() * 4 + 1;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = Math.random() * 100 + '%';
    particle.style.opacity = Math.random() * 0.3;
    document.body.appendChild(particle);
  }
}

createParticles();
</script>

</body>
</html>
