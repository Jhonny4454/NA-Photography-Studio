<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Edit Profile - NA Photography Studio</title>

<style>
html, body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* HEADER */
header {
  background: #111;
  color: white;
  padding: 12px 25px;
  display: flex;
  justify-content: space-between;
}

header h1 {
  color: #ff7f50;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: 50px auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  animation: slideUp 0.5s ease;
}

@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #ff7f50;
  box-shadow: 0 0 8px rgba(255,127,80,0.3);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff7f50, #ff6347);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 10px;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 10px 20px rgba(255,127,80,0.4);
}

/* HELPER TEXT */
.helper {
  font-size: 12px;
  color: #777;
  margin-top: -5px;
  margin-bottom: 10px;
}

/* BACK BUTTON */
.back-btn {
  display: block;
  text-align: center;
  margin-top: 15px;
  text-decoration: none;
  background: #222;
  color: white;
  padding: 10px;
  border-radius: 25px;
  transition: 0.3s;
}

.back-btn:hover {
  background: #ff7f50;
}
</style>
</head>

<body>

<header>
  <h1>NA Photography Studio</h1>
</header>

<div class="container">
  <h2>Edit Profile</h2>

  <form method="POST">

    <!-- NAME -->
    <input type="text" name="first_name" value="{{ user.first_name }}" placeholder="First Name" required>
    <input type="text" name="last_name" value="{{ user.last_name }}" placeholder="Last Name" required>

    <!-- EMAIL -->
    <input type="email" name="email" value="{{ user.email }}" placeholder="Email" required>

    <!-- MOBILE -->
    <input 
      type="text" 
      name="mobile" 
      value="{{ user.mobile }}" 
      placeholder="Mobile Number"
      pattern="[0-9]{10}"
      title="Enter 10 digit mobile number"
      required
    >

    <!-- GENDER -->
    <select name="gender">
      <option value="male" {% if user.gender == 'male' %}selected{% endif %}>Male</option>
      <option value="female" {% if user.gender == 'female' %}selected{% endif %}>Female</option>
      <option value="other" {% if user.gender == 'other' %}selected{% endif %}>Other</option>
    </select>

    <!-- USERNAME -->
    <input 
      type="text" 
      name="username" 
      value="{{ user.username }}" 
      placeholder="Username"
      pattern="[a-zA-Z0-9]{4,20}"
      title="4-20 letters or numbers"
      required
    >
    <div class="helper">Username: 4–20 letters or numbers</div>

    <!-- PASSWORD (OPTIONAL) -->
    <input 
      type="password" 
      name="password" 
      placeholder="New Password (leave blank to keep old)"
    >
    <div class="helper">Leave blank if you don’t want to change password</div>

    <button type="submit">Update Profile</button>

  </form>

  <a href="/home" class="back-btn">⬅ Back to Home</a>

</div>

</body>
</html>
