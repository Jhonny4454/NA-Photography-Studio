<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login - NA Photography Studio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
html, body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #ff7f50, #ff9966);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.8s ease;
}

/* FIX OVERFLOW ISSUE */
*, *::before, *::after {
  box-sizing: border-box;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* CONTAINER */
.login-container {
  background: white;
  padding: 35px;
  border-radius: 15px;
  width: 340px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  animation: slideUp 0.6s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

/* INPUT GROUP */
.input-group {
  position: relative;
  margin-bottom: 15px;
}

.input-group i {
  position: absolute;
  top: 50%;
  left: 12px;
  transform: translateY(-50%);
  color: #999;
}

input {
  width: 100%;
  padding: 12px 12px 12px 38px;
  border-radius: 10px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
  font-size: 14px;
}

/* FIX: prevent overflow */
input {
  max-width: 100%;
}

input:focus {
  border-color: #ff7f50;
  box-shadow: 0 0 10px rgba(255,127,80,0.3);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff7f50, #ff6347);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(255,127,80,0.4);
}

button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 15px 35px rgba(255,127,80,0.6);
}

/* ERROR */
.error {
  margin-top: 12px;
  text-align: center;
  color: red;
  font-size: 14px;
}

/* SIGNUP BUTTON LINK */
.signup-link {
  margin-top: 15px;
}

.signup-link a {
  display: block;
  width: 100%;
  text-align: center;
  padding: 12px;
  border-radius: 25px;
  background: #222;
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.signup-link a:hover {
  background: linear-gradient(45deg, #ff7f50, #ff6347);
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="login-container">
  <h2>Welcome Back</h2>

  <form method="POST" action="/">

    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" name="username" placeholder="Username" required>
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" name="password" placeholder="Password" required>
    </div>

    <button type="submit">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>

  </form>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <!-- FIXED BUTTON -->
  <div class="signup-link">
    <a href="/signup">
      <i class="fas fa-user-plus"></i> Create an account
    </a>
  </div>

</div>

</body>
</html>
