<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login - NA Photography Studio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
html, body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff7f50, #ff9966);
  overflow: hidden;
  position: relative;
}

/* BACKGROUND GLOW EFFECT */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: rgba(255,255,255,0.15);
  filter: blur(120px);
  top: -100px;
  left: -100px;
  border-radius: 50%;
  z-index: -2;
}

body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(0,0,0,0.15);
  filter: blur(120px);
  bottom: -100px;
  right: -100px;
  border-radius: 50%;
  z-index: -2;
}

/* CONTAINER */
.login-container {
  position: relative;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 40px;
  width: 340px;
  max-width: 90%;
  box-shadow: 0 25px 60px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.3);
  animation: slideUp 0.7s ease;
  z-index: 1;
}

/* ANIMATION */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(50px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  color: white;
  letter-spacing: 1px;
}

/* INPUT GROUP */
.input-group {
  position: relative;
  margin-bottom: 18px;
}

.input-group i {
  position: absolute;
  top: 50%;
  left: 14px;
  transform: translateY(-50%);
  color: #eee;
  font-size: 16px;
}

input {
  width: 100%;
  padding: 12px 12px 12px 40px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
  background: rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(10px);
  box-sizing: border-box;
}

input::placeholder {
  color: #ddd;
}

input:focus {
  box-shadow: 0 0 12px rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.3);
}

/* BUTTON (FIXED) */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff7f50, #ff6347);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;

  box-sizing: border-box;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

button:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 15px 35px rgba(255,127,80,0.6);
}

button:active {
  transform: scale(0.92);
}

button::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  left: -100%;
  top: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: all 0.6s ease;
}
button:hover::after {
  left: 100%;
}

/* ERROR */
.error {
  margin-top: 12px;
  text-align: center;
  color: #ffdddd;
  font-size: 14px;
}

/* SIGNUP BUTTON (MATCHED FIX) */
.signup-link {
  margin-top: 15px;
}

.signup-link a {
  width: 100%;
  padding: 12px;
  border-radius: 30px;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;

  background: rgba(0,0,0,0.5);
  color: white;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;

  box-sizing: border-box;
  transition: all 0.3s ease;
}

.signup-link a:hover {
  background: linear-gradient(45deg, #ff7f50, #ff6347);
  transform: scale(1.05);
}

/* FOOT TEXT */
p {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 14px;
  margin: 0;
}
p a {
  color: #fff;
  font-weight: bold;
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-container">
  <h2>User Login</h2>

  <form method="POST" action="/">
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" name="username" placeholder="Username" required>
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" name="password" placeholder="Password" required>
    </div>
    <button type="submit">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
  </form>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <div class="signup-link">
    <a href="/signup">
      <i class="fas fa-user-plus"></i> Create an account
    </a>
  </div>
</div>

<p>New to our studio? <a href="/get-hired">Get Hired as a Photographer</a></p>

</body>
</html>
