{% extends "admin_base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Add Portfolio Image for {{ photographer.first_name }} {{ photographer.last_name }}</h2>
    <form method="POST">
        <div class="mb-3"><label>Image URL (direct link)</label><input type="url" name="image_url" class="form-control" required></div>
        <div class="mb-3"><label>Location</label><input type="text" name="location" class="form-control"></div>
        <div class="mb-3"><label>Shoot Date</label><input type="date" name="shoot_date" class="form-control"></div>
        <div class="mb-3"><label>Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
        <button type="submit" class="btn btn-success">Add Image</button>
        <a href="/admin/portfolio" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
