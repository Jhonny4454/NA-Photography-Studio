{% extends "admin_base.html" %}
{% block content %}
<h1>Add Video for {{ photographer.first_name }} {{ photographer.last_name }}</h1>
<form method="POST" enctype="multipart/form-data">
  <div class="mb-3">
    <label>Title</label>
    <input type="text" name="title" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Description</label>
    <textarea name="description" class="form-control"></textarea>
  </div>
  <div class="mb-3">
    <label>Duration (seconds)</label>
    <input type="number" step="0.01" name="duration_seconds" class="form-control">
  </div>
  <div class="mb-3">
    <label>Poster Image</label>
    <input type="file" name="poster_image" accept="image/*" class="form-control">
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" name="is_short_loop" class="form-check-input">
    <label class="form-check-label">Super Short Loop</label>
  </div>
  <div class="mb-3">
    <label>Sort Order</label>
    <input type="number" name="sort_order" value="0" class="form-control">
  </div>
  <div class="mb-3">
    <label>Video Files (MP4, WebM, OGG)</label>
    <input type="file" name="video_files" multiple accept="video/mp4,video/webm,video/ogg" class="form-control" required>
  </div>
  <button type="submit" class="btn btn-success">Save Video</button>
  <a href="/admin/photographer_videos/{{ photographer.id }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
