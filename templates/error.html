<!DOCTYPE html>
<html>
<head>
    <title>Error</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f8fafc 0%, #eef2f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .error-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.05);
            max-width: 540px;
            width: 100%;
            padding: 2.5rem 2rem;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        h1 {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e293b, #2d3a4f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            word-break: break-word;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #334155;
            background: #f1f5f9;
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 60px;
            margin-top: 0.5rem;
            font-weight: 500;
            box-shadow: inset 0 1px 0 #ffffff, 0 1px 2px rgba(0,0,0,0.05);
            max-width: 100%;
            word-wrap: break-word;
        }
        /* Keep everything responsive and clean */
        @media (max-width: 480px) {
            .error-container {
                padding: 1.8rem 1.2rem;
            }
            h1 {
                font-size: 3rem;
            }
            p {
                font-size: 1rem;
                padding: 0.5rem 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>Error {{ code }}</h1>
        <p>{{ message }}</p>
    </div>
</body>
</html>
